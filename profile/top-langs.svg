          x="230.95000000000002"
          y="0"
          width="17.490000000000002"
          height="8"
          fill="#41b883"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="238.44000000000003"
          y="0"
          width="14.469999999999999"
          height="8"
          fill="#663399"
        />
      
        <rect
          mask="url(#rect-mask)"
          data-testid="lang-progress"
          x="242.91000000000003"
          y="0"
          width="13.75"
          height="8"
          fill="#3572A5"
        />
      
        <rect
